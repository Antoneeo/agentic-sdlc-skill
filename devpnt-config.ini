; Configuration for devpnt
; ============================================
[Paths]
; Base directory for the project to analyze. If blank, current working directory is used.
compress_folder = 

; --- Core Directories ---
; persistent_data_dir: Directory for valuable, persistent data (docs, cache, db).
; work_dir: Directory for temporary, transient files (logs, batch outputs).
persistent_data_dir = .devpnt
work_dir = .workdir

; --- Relative Paths (based on core directories) ---
; Database path, relative to persistent_data_dir
db_path = %(persistent_data_dir)s/database.db
; Logs directory, relative to work_dir
logs_dir = %(work_dir)s/logs

; --- M31: Eclosion Cloud Integration ---
; URL of the Eclosion server (e.g., https://eclosionplatform.com)
eclosion_url = https://eclosionplatform.com
; --- End M31 ---

; Other temporary outputs, relative to work_dir
output_archive_dir = %(work_dir)s/archives
ai_summary_output_file = %(work_dir)s/project-summary.ai.txt
partial_archive_output_file = %(work_dir)s/partial_project_archive.txt
llm_request_input_file = %(work_dir)s/llm_request.txt

; --- Paths for decompression (user must typically specify these) ---
decompress_folder =
input_archive =

; [Filters]
;   white_list: Comma-separated file extensions to include (e.g., .py,.txt).
;   black_list: Comma-separated file/folder names to exclude (e.g., .git,.workdir).
;   compress_binary: True or False. Whether to include binary files (Base64 encoded).
;
; [LLMProviders]
;   --- Utility LLM (for Summaries, Translation, etc.) ---
;   active_provider_utility: "openai", "google", "ollama", "dummy". Default: "dummy".
;   openai_model_utility: Default: "gpt-3.5-turbo". See cost_utils.py for models.
;   google_model_utility: Default: "gemini-flash-lite-latest". See cost_utils.py for models.
;   ollama_model_utility: Default: "llama3".
;
;   --- Agent LLM (for Chat and Reasoning) ---
;   active_provider_agent: "openai", "google", "ollama", "dummy". Default: "dummy".
;   openai_model_agent: Default: "gpt-3.5-turbo".
;   google_model_agent: Default: "gemini-flash-lite-latest".
;   ollama_model_agent: Default: "llama3".
;
;   --- Common Settings ---
;   llm_file_system_prompt: Custom system prompt for summarizing FILES. Blank for default.
;   llm_directory_system_prompt: Custom system prompt for summarizing FOLDERS. Blank for default.
;   ollama_base_url: Base URL for Ollama's OpenAI-compatible API. Default: "http://localhost:11434/v1".
;
;   --- API Keys (Fallback - Environment variables are preferred) ---
;   openai_api_key_from_config =
;   google_api_key_from_config =
;
; [Translation]
;   uncertainty_marker: Marker for AI's low confidence translations. Default: [AI_UNCERTAIN]
;   default_target_language: Optional default target language (e.g., it, fr).
;   custom_translation_prompt: Optional custom system prompt template for translation.
;
; [Appearance] ; GUI Flet Specific Settings
;   active_theme: Name of the Flet GUI theme to use.
;                 Options: default_dark_deep_purple, custom_light_teal, custom_dark_amber (see devpnt/gui/styles.py for all options)
;                 Default: default_dark_deep_purple
; ============================================

[Filters]
white_list =
black_list = .git,.exe,.pyc,.dll,build,__pycache__,.DS_Store,node_modules,venv,env,target,.pytest_cache,.devpnt,.coverage,*.log,*.lock,*.egg-info,.workdir
compress_binary = False

[LLMProviders]
active_provider_utility = dummy
openai_model_utility = gpt-3.5-turbo
google_model_utility = gemini-flash-lite-latest
ollama_model_utility = llama3
active_provider_agent = dummy
openai_model_agent = gpt-3.5-turbo
google_model_agent = gemini-flash-lite-latest
ollama_model_agent = llama3
llm_file_system_prompt =
llm_directory_system_prompt =
ollama_base_url = http://localhost:11434/v1
openai_api_key_from_config =
google_api_key_from_config =

[Translation]
uncertainty_marker = [AI_UNCERTAIN]
default_target_language =

[Appearance]
active_theme = default_dark_deep_purple

[Summaries]
; Controls how file summaries are generated.
;   llm_mode: off | auto | on
llm_mode = on
; Maximum LOC threshold for enrichment/truncation decisions
llm_max_loc = 10000
; Minimal LOC to enrich when mode=on (skip tiny files)
llm_min_loc_on = 80
; Comma-separated glob patterns to skip enrichment (applies to Python files)
skip_patterns = tests/**,**/migrations/**,**/vendor/**,**/node_modules/**,**/*generated*.*,**/*.min.*,**/fixtures/**,**/snapshots/**

[AgentPolicy]
; Controls agent behavior and safety thresholds.
;   allow_agent_delegation: True | False
allow_agent_delegation = True
;   allow_mcp_resolution: True | False — when False (default), proposal resolution via
;   MCP is refused server-side and the resolve tool is hidden; the devPNT GUI Proposals
;   tab becomes the sole approval surface (M41). Reads (status/inspect) stay available.
allow_mcp_resolution = False
; Threshold for file content degradation in characters. Over this, a summary is returned.
file_size_threshold = 30000
